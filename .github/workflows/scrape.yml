name: Daily Scraper

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scrape mode'
        required: true
        type: choice
        options:
          - auto
          - completed
        default: auto
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests beautifulsoup4 --break-system-packages

      - name: Run scraper
        run: python3 scripts/scraper.py --mode ${{ github.event.inputs.mode || 'auto' }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add waiting_list.json uploading_list.json retry_list.json
          git diff --staged --quiet || git commit -m "chore: scrape [${{ github.event.inputs.mode || 'auto' }}] $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do git push && break || sleep 15; done
